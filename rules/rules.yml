# ============================================================
# ISO 27001:2022 Annex A Section 8 - Audit Rules
# ============================================================
# Each rule defines a check against the collected system config.
#
# Fields:
#   id:           Unique rule identifier
#   control:      ISO 27001 control reference (A.8.x)
#   control_name: Human-readable control name
#   title:        Short title of the check
#   description:  What this check verifies
#   severity:     high / medium / low
#   check:
#     field:      Dot-notation path in system_config.json
#     operator:   equals / not_equals / less_than_equal /
#                 greater_than_equal / greater_than /
#                 contains / not_contains / is_true / is_false
#     expected:   Expected value
#   remediation:  Steps to fix if the check fails
# ============================================================

rules:

  # --------------------------------------------------------
  # A.8.2 - Privileged Access Rights
  # --------------------------------------------------------

  - id: "A.8.2.1"
    control: "A.8.2"
    control_name: "Privileged Access Rights"
    title: "SSH Root Login Disabled"
    description: "Direct root login via SSH must be disabled to enforce accountability and prevent brute-force attacks on the root account."
    severity: "high"
    check:
      field: "ssh_config.PermitRootLogin"
      operator: "equals"
      expected: "no"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set or add the following line:
         PermitRootLogin no
      3. Restart the SSH service:
         sudo systemctl restart sshd
      4. Ensure you have a non-root user with sudo access before making this change.

  - id: "A.8.2.2"
    control: "A.8.2"
    control_name: "Privileged Access Rights"
    title: "No NOPASSWD Sudo Entries"
    description: "Sudo access should require password authentication. NOPASSWD entries allow privilege escalation without verification."
    severity: "high"
    check:
      field: "sudo_config.nopasswd_entries_exist"
      operator: "is_false"
      expected: "false"
    remediation: |
      1. Edit the sudoers file safely:
         sudo visudo
      2. Find and remove or modify any lines containing NOPASSWD:
         user ALL=(ALL) NOPASSWD: ALL  →  user ALL=(ALL) ALL
      3. Also check files in /etc/sudoers.d/:
         sudo ls -la /etc/sudoers.d/
         sudo visudo -f /etc/sudoers.d/<filename>
      4. Remove the NOPASSWD tag from each entry.

  - id: "A.8.2.3"
    control: "A.8.2"
    control_name: "Privileged Access Rights"
    title: "Sudoers File Permissions"
    description: "The /etc/sudoers file should have restricted permissions (0440) to prevent unauthorized modifications."
    severity: "medium"
    check:
      field: "sudo_config.sudoers_permissions"
      operator: "equals"
      expected: "0440"
    remediation: |
      1. Set correct permissions on the sudoers file:
         sudo chmod 0440 /etc/sudoers
      2. Verify the permissions:
         ls -la /etc/sudoers
         Expected output: -r--r----- 1 root root

  # --------------------------------------------------------
  # A.8.5 - Secure Authentication
  # --------------------------------------------------------

  - id: "A.8.5.1"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "SSH Key-Based Authentication Only"
    description: "Password-based SSH authentication should be disabled in favor of key-based authentication to prevent brute-force attacks."
    severity: "high"
    check:
      field: "ssh_config.PasswordAuthentication"
      operator: "equals"
      expected: "no"
    remediation: |
      1. First, ensure SSH key-based authentication is set up:
         ssh-keygen -t ed25519 -C "your_email@example.com"
         ssh-copy-id user@server
      2. Test key-based login works before disabling passwords.
      3. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      4. Set:
         PasswordAuthentication no
         PubkeyAuthentication yes
      5. Restart SSH:
         sudo systemctl restart sshd

  - id: "A.8.5.2"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "Password Minimum Length (>=12)"
    description: "Passwords must be at least 12 characters long to provide adequate security against brute-force attacks."
    severity: "high"
    check:
      field: "password_policy.minlen"
      operator: "greater_than_equal"
      expected: "12"
    remediation: |
      1. Install pam_pwquality if not present:
         sudo apt install libpam-pwquality
      2. Edit pwquality configuration:
         sudo nano /etc/security/pwquality.conf
      3. Set minimum password length:
         minlen = 12
      4. Ensure PAM is configured to use pwquality:
         sudo nano /etc/pam.d/common-password
         Add/modify: password requisite pam_pwquality.so retry=3

  - id: "A.8.5.3"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "Password Maximum Age (<=90 days)"
    description: "Passwords should expire within 90 days to limit the window of exposure if credentials are compromised."
    severity: "medium"
    check:
      field: "password_policy.PASS_MAX_DAYS"
      operator: "less_than_equal"
      expected: "90"
    remediation: |
      1. Edit login definitions:
         sudo nano /etc/login.defs
      2. Set maximum password age:
         PASS_MAX_DAYS   90
      3. Apply to existing users (replace <username>):
         sudo chage --maxdays 90 <username>
      4. Verify with:
         sudo chage -l <username>

  - id: "A.8.5.4"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "Password Complexity Enforcement"
    description: "PAM pwquality module should be installed and configured to enforce password complexity requirements."
    severity: "medium"
    check:
      field: "password_policy.pam_pwquality_installed"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Install pam_pwquality:
         sudo apt install libpam-pwquality
      2. Configure password complexity:
         sudo nano /etc/security/pwquality.conf
      3. Set the following values:
         minlen = 12
         dcredit = -1    (require at least 1 digit)
         ucredit = -1    (require at least 1 uppercase)
         lcredit = -1    (require at least 1 lowercase)
         ocredit = -1    (require at least 1 special character)
         minclass = 3    (require at least 3 character classes)
      4. Configure PAM:
         sudo nano /etc/pam.d/common-password
         Add: password requisite pam_pwquality.so retry=3

  - id: "A.8.5.5"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "Empty Passwords Not Permitted"
    description: "SSH must not allow authentication with empty passwords."
    severity: "high"
    check:
      field: "ssh_config.PermitEmptyPasswords"
      operator: "equals"
      expected: "no"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set:
         PermitEmptyPasswords no
      3. Restart SSH:
         sudo systemctl restart sshd

  - id: "A.8.5.6"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "SSH Max Authentication Attempts (<=4)"
    description: "Limit SSH authentication attempts to prevent brute-force attacks. Maximum 4 attempts per connection."
    severity: "medium"
    check:
      field: "ssh_config.MaxAuthTries"
      operator: "less_than_equal"
      expected: "4"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set:
         MaxAuthTries 4
      3. Restart SSH:
         sudo systemctl restart sshd
      4. Consider also installing fail2ban for additional protection:
         sudo apt install fail2ban

  - id: "A.8.5.7"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "SSH Login Grace Time (<=60 seconds)"
    description: "The time allowed to complete SSH authentication should be limited to 60 seconds to prevent resource exhaustion."
    severity: "low"
    check:
      field: "ssh_config.LoginGraceTime"
      operator: "less_than_equal"
      expected: "60"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set:
         LoginGraceTime 60
      3. Restart SSH:
         sudo systemctl restart sshd

  - id: "A.8.5.8"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "SSH X11 Forwarding Disabled"
    description: "X11 forwarding should be disabled unless specifically required, as it can be exploited for unauthorized display access."
    severity: "medium"
    check:
      field: "ssh_config.X11Forwarding"
      operator: "equals"
      expected: "no"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set:
         X11Forwarding no
      3. Restart SSH:
         sudo systemctl restart sshd

  - id: "A.8.5.9"
    control: "A.8.5"
    control_name: "Secure Authentication"
    title: "SSH Warning Banner Configured"
    description: "An SSH login banner should be configured to display legal warnings and deter unauthorized access attempts."
    severity: "low"
    check:
      field: "ssh_config.Banner"
      operator: "not_equals"
      expected: "none"
    remediation: |
      1. Create a banner file:
         sudo nano /etc/ssh/banner.txt
      2. Add an appropriate warning message, for example:
         ************************************************************
         WARNING: Unauthorized access to this system is prohibited.
         All connections are monitored and recorded.
         Disconnect IMMEDIATELY if you are not an authorized user.
         ************************************************************
      3. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      4. Set:
         Banner /etc/ssh/banner.txt
      5. Restart SSH:
         sudo systemctl restart sshd

  # --------------------------------------------------------
  # A.8.7 - Protection Against Malware
  # --------------------------------------------------------

  - id: "A.8.7.1"
    control: "A.8.7"
    control_name: "Protection Against Malware"
    title: "Antivirus Software Installed (ClamAV)"
    description: "An antivirus solution such as ClamAV should be installed to detect and prevent malware."
    severity: "high"
    check:
      field: "services.clamav_daemon.installed"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Install ClamAV:
         sudo apt update
         sudo apt install clamav clamav-daemon
      2. Update virus definitions:
         sudo systemctl stop clamav-freshclam
         sudo freshclam
         sudo systemctl start clamav-freshclam
      3. Enable and start the daemon:
         sudo systemctl enable clamav-daemon
         sudo systemctl start clamav-daemon
      4. Configure scheduled scans:
         sudo crontab -e
         Add: 0 2 * * * /usr/bin/clamscan -r /home --log=/var/log/clamav/daily_scan.log

  - id: "A.8.7.2"
    control: "A.8.7"
    control_name: "Protection Against Malware"
    title: "Antivirus Service Running"
    description: "The ClamAV antivirus daemon should be actively running to provide real-time malware protection."
    severity: "high"
    check:
      field: "services.clamav_daemon.running"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Start the ClamAV daemon:
         sudo systemctl start clamav-daemon
      2. Enable it to start on boot:
         sudo systemctl enable clamav-daemon
      3. Check status:
         sudo systemctl status clamav-daemon
      4. If ClamAV is not installed, install it first (see A.8.7.1).

  # --------------------------------------------------------
  # A.8.8 - Management of Technical Vulnerabilities
  # --------------------------------------------------------

  - id: "A.8.8.1"
    control: "A.8.8"
    control_name: "Management of Technical Vulnerabilities"
    title: "Automatic Security Updates Enabled"
    description: "Unattended-upgrades should be enabled to automatically install security patches and reduce the window of vulnerability."
    severity: "high"
    check:
      field: "updates.auto_updates_enabled"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Install unattended-upgrades:
         sudo apt install unattended-upgrades apt-listchanges
      2. Enable automatic updates:
         sudo dpkg-reconfigure -plow unattended-upgrades
      3. Configure update settings:
         sudo nano /etc/apt/apt.conf.d/50unattended-upgrades
      4. Ensure security updates are enabled:
         Unattended-Upgrade::Allowed-Origins {
           "${distro_id}:${distro_codename}-security";
         };
      5. Enable the periodic update check:
         sudo nano /etc/apt/apt.conf.d/20auto-upgrades
         APT::Periodic::Update-Package-Lists "1";
         APT::Periodic::Unattended-Upgrade "1";

  - id: "A.8.8.2"
    control: "A.8.8"
    control_name: "Management of Technical Vulnerabilities"
    title: "No Pending Security Updates"
    description: "All available security patches should be applied promptly. Pending security updates indicate unpatched vulnerabilities."
    severity: "high"
    check:
      field: "updates.pending_security_updates"
      operator: "less_than_equal"
      expected: "0"
    remediation: |
      1. Update package lists:
         sudo apt update
      2. Install all security updates:
         sudo apt upgrade -y
      3. If kernel updates are pending, reboot the system:
         sudo reboot
      4. Verify no security updates remain:
         apt list --upgradable 2>/dev/null | grep -i security

  # --------------------------------------------------------
  # A.8.9 - Configuration Management
  # --------------------------------------------------------

  - id: "A.8.9.1"
    control: "A.8.9"
    control_name: "Configuration Management"
    title: "/etc/passwd File Permissions"
    description: "The /etc/passwd file should have permissions set to 0644 (readable by all, writable only by root)."
    severity: "medium"
    check:
      field: "file_permissions.etc_passwd.mode"
      operator: "equals"
      expected: "0644"
    remediation: |
      1. Set correct permissions:
         sudo chmod 644 /etc/passwd
      2. Set correct ownership:
         sudo chown root:root /etc/passwd
      3. Verify:
         ls -la /etc/passwd
         Expected: -rw-r--r-- 1 root root

  - id: "A.8.9.2"
    control: "A.8.9"
    control_name: "Configuration Management"
    title: "/etc/shadow File Permissions"
    description: "The /etc/shadow file should have permissions set to 0640 or more restrictive to protect password hashes."
    severity: "high"
    check:
      field: "file_permissions.etc_shadow.mode"
      operator: "equals"
      expected: "0640"
    remediation: |
      1. Set correct permissions:
         sudo chmod 640 /etc/shadow
      2. Set correct ownership:
         sudo chown root:shadow /etc/shadow
      3. Verify:
         ls -la /etc/shadow
         Expected: -rw-r----- 1 root shadow

  - id: "A.8.9.3"
    control: "A.8.9"
    control_name: "Configuration Management"
    title: "SSH Configuration File Permissions"
    description: "The /etc/ssh/sshd_config file should have permissions set to 0600 to prevent unauthorized reading of SSH settings."
    severity: "medium"
    check:
      field: "file_permissions.sshd_config.mode"
      operator: "equals"
      expected: "0600"
    remediation: |
      1. Set correct permissions:
         sudo chmod 600 /etc/ssh/sshd_config
      2. Set correct ownership:
         sudo chown root:root /etc/ssh/sshd_config
      3. Verify:
         ls -la /etc/ssh/sshd_config
         Expected: -rw------- 1 root root

  - id: "A.8.9.4"
    control: "A.8.9"
    control_name: "Configuration Management"
    title: "/etc/gshadow File Permissions"
    description: "The /etc/gshadow file should have permissions set to 0640 to protect group password information."
    severity: "medium"
    check:
      field: "file_permissions.etc_gshadow.mode"
      operator: "equals"
      expected: "0640"
    remediation: |
      1. Set correct permissions:
         sudo chmod 640 /etc/gshadow
      2. Set correct ownership:
         sudo chown root:shadow /etc/gshadow
      3. Verify:
         ls -la /etc/gshadow
         Expected: -rw-r----- 1 root shadow

  # --------------------------------------------------------
  # A.8.13 - Information Backup
  # --------------------------------------------------------

  - id: "A.8.13.1"
    control: "A.8.13"
    control_name: "Information Backup"
    title: "Backup Solution Configured"
    description: "A backup solution should be configured with scheduled backup jobs to ensure data can be recovered in case of failure."
    severity: "high"
    check:
      field: "backup.backup_configured"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Choose and install a backup solution:
         sudo apt install rsync    # For simple file sync
         # OR
         sudo apt install borgbackup  # For deduplicating backups
         # OR
         sudo apt install restic      # For encrypted backups
      2. Create a backup script:
         sudo nano /usr/local/bin/backup.sh
      3. Schedule regular backups via cron:
         sudo crontab -e
         Add: 0 2 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1
      4. Test the backup and verify restore works.
      5. Store backups on a separate system or remote location.

  # --------------------------------------------------------
  # A.8.15 - Logging
  # --------------------------------------------------------

  - id: "A.8.15.1"
    control: "A.8.15"
    control_name: "Logging"
    title: "Audit Daemon Running (auditd)"
    description: "The Linux Audit daemon (auditd) should be running to capture security-relevant system events."
    severity: "high"
    check:
      field: "services.auditd.running"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Install auditd:
         sudo apt install auditd audispd-plugins
      2. Enable and start the service:
         sudo systemctl enable auditd
         sudo systemctl start auditd
      3. Verify it is running:
         sudo systemctl status auditd

  - id: "A.8.15.2"
    control: "A.8.15"
    control_name: "Logging"
    title: "Syslog Service Running (rsyslog)"
    description: "The rsyslog service should be active to collect and manage system log messages."
    severity: "high"
    check:
      field: "services.rsyslog.running"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Install rsyslog:
         sudo apt install rsyslog
      2. Enable and start the service:
         sudo systemctl enable rsyslog
         sudo systemctl start rsyslog
      3. Verify it is running:
         sudo systemctl status rsyslog

  - id: "A.8.15.3"
    control: "A.8.15"
    control_name: "Logging"
    title: "Audit Rules Configured"
    description: "Audit rules should be defined to monitor critical security events such as file access, user authentication, and privilege changes."
    severity: "medium"
    check:
      field: "audit_logging.auditd_rules_count"
      operator: "greater_than"
      expected: "0"
    remediation: |
      1. Create audit rules file:
         sudo nano /etc/audit/rules.d/audit.rules
      2. Add recommended rules:
         # Monitor login/logout events
         -w /var/log/faillog -p wa -k logins
         -w /var/log/lastlog -p wa -k logins

         # Monitor user/group changes
         -w /etc/passwd -p wa -k identity
         -w /etc/group -p wa -k identity
         -w /etc/shadow -p wa -k identity
         -w /etc/gshadow -p wa -k identity

         # Monitor sudoers
         -w /etc/sudoers -p wa -k sudo_changes
         -w /etc/sudoers.d/ -p wa -k sudo_changes

         # Monitor SSH config
         -w /etc/ssh/sshd_config -p wa -k sshd_config

         # Monitor system calls for privilege escalation
         -a always,exit -F arch=b64 -S execve -k exec
      3. Reload audit rules:
         sudo augenrules --load
      4. Verify rules loaded:
         sudo auditctl -l

  - id: "A.8.15.4"
    control: "A.8.15"
    control_name: "Logging"
    title: "Log Retention Configured"
    description: "Log rotation should be properly configured to manage log file sizes while retaining logs for an adequate period."
    severity: "low"
    check:
      field: "audit_logging.log_retention_configured"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Configure log rotation:
         sudo nano /etc/logrotate.conf
      2. Ensure appropriate retention period:
         rotate 12          # Keep 12 rotated logs
         weekly             # Rotate weekly
         compress           # Compress old logs
         delaycompress      # Delay compression by one rotation
      3. Configure auditd log retention:
         sudo nano /etc/audit/auditd.conf
         max_log_file = 50
         max_log_file_action = ROTATE
         num_logs = 10
      4. Restart services:
         sudo systemctl restart auditd

  # --------------------------------------------------------
  # A.8.16 - Monitoring Activities
  # --------------------------------------------------------

  - id: "A.8.16.1"
    control: "A.8.16"
    control_name: "Monitoring Activities"
    title: "Monitoring Agent Installed"
    description: "A monitoring solution should be deployed to track system health, performance, and security events in real-time."
    severity: "medium"
    check:
      field: "monitoring.agent_installed"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Choose and install a monitoring solution:
         # Option 1: Prometheus Node Exporter
         sudo apt install prometheus-node-exporter
         sudo systemctl enable prometheus-node-exporter
         sudo systemctl start prometheus-node-exporter

         # Option 2: Wazuh Agent (Security monitoring)
         curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | gpg --dearmor > /etc/apt/keyrings/wazuh.gpg
         sudo apt install wazuh-agent

         # Option 3: Zabbix Agent
         sudo apt install zabbix-agent
         sudo systemctl enable zabbix-agent
         sudo systemctl start zabbix-agent
      2. Configure the agent to report to your monitoring server.
      3. Verify the agent is running:
         sudo systemctl status <monitoring-service>

  # --------------------------------------------------------
  # A.8.17 - Clock Synchronization
  # --------------------------------------------------------

  - id: "A.8.17.1"
    control: "A.8.17"
    control_name: "Clock Synchronization"
    title: "NTP Time Synchronization Active"
    description: "System clock must be synchronized via NTP to ensure accurate timestamps for logs, certificates, and audit trails."
    severity: "medium"
    check:
      field: "ntp.synchronized"
      operator: "is_true"
      expected: "true"
    remediation: |
      1. Check current synchronization status:
         timedatectl status
      2. Enable NTP synchronization:
         sudo timedatectl set-ntp true
      3. Or install and configure chrony for better accuracy:
         sudo apt install chrony
         sudo systemctl enable chrony
         sudo systemctl start chrony
      4. Verify synchronization:
         chronyc tracking
         # or
         timedatectl status

  # --------------------------------------------------------
  # A.8.20 - Networks Security
  # --------------------------------------------------------

  - id: "A.8.20.1"
    control: "A.8.20"
    control_name: "Networks Security"
    title: "Firewall Active"
    description: "A host-based firewall (UFW/iptables) must be enabled and active to control network traffic."
    severity: "high"
    check:
      field: "firewall.status"
      operator: "equals"
      expected: "active"
    remediation: |
      1. Enable UFW:
         sudo ufw enable
      2. Set default policies:
         sudo ufw default deny incoming
         sudo ufw default allow outgoing
      3. Allow necessary services:
         sudo ufw allow ssh
         # Add other required ports:
         # sudo ufw allow 80/tcp
         # sudo ufw allow 443/tcp
      4. Check status:
         sudo ufw status verbose

  - id: "A.8.20.2"
    control: "A.8.20"
    control_name: "Networks Security"
    title: "Default Incoming Traffic Denied"
    description: "The firewall should deny all incoming traffic by default and only allow explicitly permitted connections."
    severity: "high"
    check:
      field: "firewall.default_incoming"
      operator: "equals"
      expected: "deny"
    remediation: |
      1. Set default deny policy for incoming traffic:
         sudo ufw default deny incoming
      2. Verify current defaults:
         sudo ufw status verbose
      3. Ensure required services are explicitly allowed:
         sudo ufw allow ssh
      4. Check rules:
         sudo ufw status numbered

  # --------------------------------------------------------
  # A.8.22 - Segregation of Networks
  # --------------------------------------------------------

  - id: "A.8.22.1"
    control: "A.8.22"
    control_name: "Segregation of Networks"
    title: "IPv4 Forwarding Disabled"
    description: "IP forwarding should be disabled unless the system is acting as a router, to prevent it from being used to bypass network segmentation."
    severity: "medium"
    check:
      field: "network.ip_forwarding"
      operator: "equals"
      expected: "0"
    remediation: |
      1. Disable IP forwarding immediately:
         sudo sysctl -w net.ipv4.ip_forward=0
      2. Make the change persistent:
         sudo nano /etc/sysctl.conf
         Add or modify: net.ipv4.ip_forward = 0
      3. Apply:
         sudo sysctl -p
      4. Verify:
         cat /proc/sys/net/ipv4/ip_forward
         Should output: 0

  - id: "A.8.22.2"
    control: "A.8.22"
    control_name: "Segregation of Networks"
    title: "ICMP Redirects Not Accepted"
    description: "The system should not accept ICMP redirects, which can be used to alter routing tables and redirect traffic."
    severity: "medium"
    check:
      field: "network.icmp_redirect_accept"
      operator: "equals"
      expected: "0"
    remediation: |
      1. Disable ICMP redirect acceptance:
         sudo sysctl -w net.ipv4.conf.all.accept_redirects=0
         sudo sysctl -w net.ipv4.conf.default.accept_redirects=0
      2. Make persistent:
         sudo nano /etc/sysctl.conf
         net.ipv4.conf.all.accept_redirects = 0
         net.ipv4.conf.default.accept_redirects = 0
      3. Apply:
         sudo sysctl -p

  - id: "A.8.22.3"
    control: "A.8.22"
    control_name: "Segregation of Networks"
    title: "ICMP Redirects Not Sent"
    description: "The system should not send ICMP redirects to prevent potential man-in-the-middle attacks."
    severity: "medium"
    check:
      field: "network.send_redirects"
      operator: "equals"
      expected: "0"
    remediation: |
      1. Disable sending ICMP redirects:
         sudo sysctl -w net.ipv4.conf.all.send_redirects=0
         sudo sysctl -w net.ipv4.conf.default.send_redirects=0
      2. Make persistent:
         sudo nano /etc/sysctl.conf
         net.ipv4.conf.all.send_redirects = 0
         net.ipv4.conf.default.send_redirects = 0
      3. Apply:
         sudo sysctl -p

  # --------------------------------------------------------
  # A.8.24 - Use of Cryptography
  # --------------------------------------------------------

  - id: "A.8.24.1"
    control: "A.8.24"
    control_name: "Use of Cryptography"
    title: "SSH Strong Ciphers Only"
    description: "SSH should only use strong, modern ciphers. Weak ciphers like 3DES, Blowfish, and CBC-mode ciphers must be avoided."
    severity: "high"
    check:
      field: "ssh_config.Ciphers"
      operator: "not_contains"
      expected: "3des"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set strong ciphers only:
         Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
      3. Restart SSH:
         sudo systemctl restart sshd
      4. Test connectivity from a client before closing current session.

  - id: "A.8.24.2"
    control: "A.8.24"
    control_name: "Use of Cryptography"
    title: "SSH Strong MACs Only"
    description: "SSH should use strong Message Authentication Code algorithms. Weak MACs like MD5 and SHA1 must not be used."
    severity: "high"
    check:
      field: "ssh_config.MACs"
      operator: "not_contains"
      expected: "md5"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set strong MACs only:
         MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256
      3. Restart SSH:
         sudo systemctl restart sshd

  - id: "A.8.24.3"
    control: "A.8.24"
    control_name: "Use of Cryptography"
    title: "SSH Strong Key Exchange Algorithms"
    description: "SSH should use strong key exchange algorithms. Weak algorithms like diffie-hellman-group1-sha1 must be avoided."
    severity: "high"
    check:
      field: "ssh_config.KexAlgorithms"
      operator: "not_contains"
      expected: "diffie-hellman-group1"
    remediation: |
      1. Edit SSH configuration:
         sudo nano /etc/ssh/sshd_config
      2. Set strong key exchange algorithms:
         KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,diffie-hellman-group-exchange-sha256
      3. Restart SSH:
         sudo systemctl restart sshd
